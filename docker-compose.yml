version: "3.9"

volumes:
  postgres_data:
  pgadmin_data:
  caddy_data:
  caddy_config:

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: restaurant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: se-toolkit-hackathon/backend:develop
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: restaurant
      CORS_ORIGINS: http://127.0.0.1:8000,http://127.0.0.1:8080,http://10.93.26.29:8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/restaurant
    volumes:
      - ./frontend:/srv:ro
    ports:
      - "127.0.0.1:8080:8000"

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - pgadmin_config:/etc/pgadmin
    ports:
      - "127.0.0.1:8085:80"
    depends_on:
      - postgres

  caddy:
    build:
      context: ./infra/caddy
    image: se-toolkit-hackathon/caddy:develop
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./frontend:/srv:ro
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8000:80"
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:-localhost}
      BACKEND_INTERNAL: backend:8000

  bot:
    build:
      context: ./bot
      args:
        REGISTRY_PREFIX: ""
    image: se-toolkit-hackathon/bot:develop
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      LMS_API_BASE_URL: http://backend:8000
      LMS_API_KEY: supersecret
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL}
      LLM_API_MODEL: ${LLM_API_MODEL:-qwen-coder}
